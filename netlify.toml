# Netlify Configuration for Law Office Frontend
# Using Google Apps Script for backend
[build]
  # הספרייה עם הקבצים לפרסום
  publish = "frontend"

  # No build command needed - static site
  command = ""

# Custom headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Service Worker - never cache
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# HTML files - always revalidate
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# Manifest - always revalidate
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# JS files - short cache with revalidation
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# CSS files - short cache with revalidation
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Images - long cache (they rarely change)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Dashboard route
[[redirects]]
  from = "/dashboard"
  to = "/dashboard-secretary.html"
  status = 200

# Task response page route
[[redirects]]
  from = "/task-response"
  to = "/task-response.html"
  status = 200

# SPA fallback - redirect all non-file requests to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
